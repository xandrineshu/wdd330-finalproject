<body>

    <header>
        <div class="logo-area">
            <div class="icon-placeholder">
                <img src="images/pokedeck-icon.png" alt="Pokeball Icon">
            </div>
            <h1>Pokemon Strategist</h1>
        </div>
        
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="favorites.html">My Favorites</a></li>

    <section class="search-area">
        <input type="text" placeholder="search... (ex: 'Pikachu')">
        <button type="submit">search</button>

    <main class="grid-container">

        <article class="card-display">
            <div class="card-placeholder">
                (pokemon card will appear here)
            </div>

        <aside class="stats-display">
            <div class="box-text">
                (stats will appear here)
            </div>
        </aside>

        <article class="evolution-chain">
            <div class="box-text">
                (pokemon evolution chain will appear here)
            </div>
        </article>
